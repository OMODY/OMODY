<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMODY</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #0A1AFF 0%, #000 60%);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* Background glow animation */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,106,0,0.15), transparent 70%);
  animation: moveGlow 10s linear infinite;
}

@keyframes moveGlow {
  0% { transform: translate(-20%, -20%); }
  50% { transform: translate(20%, 20%); }
  100% { transform: translate(-20%, -20%); }
}

/* Logo */
.logo {
  margin-top: 60px;
  width: 160px;
  filter: drop-shadow(0 0 20px #FF6A00);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* Title */
h1 {
  margin-top: 10px;
  font-size: 36px;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #0A1AFF, #FF6A00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Container */
.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

/* Glass Buttons */
.button {
  display: block;
  margin: 18px 0;
  padding: 18px;
  border-radius: 18px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
  color: white;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.1);

  transition: 0.3s;
  position: relative;
}

/* Neon glow */
.button::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: linear-gradient(45deg, #0A1AFF, #FF6A00);
  opacity: 0;
  transition: 0.3s;
}

.button:hover::after {
  opacity: 0.2;
}

.button:hover {
  transform: scale(1.05);
}

/* Platform hover colors */
.twitch:hover { box-shadow: 0 0 25px #9146FF; }
.kick:hover { box-shadow: 0 0 25px #00FF99; }
.youtube:hover { box-shadow: 0 0 25px #FF0000; }

/* Footer */
.footer {
  margin-top: 40px;
  font-size: 13px;
  color: #aaa;
  letter-spacing: 2px;
}
</style>

</head>

<body>

<!-- ضع هنا صورة الشعار -->
<img src="omody_main_logo.png" class="logo">

<h1>OMODY</h1>

<div class="container">

<a class="button twitch" href="https://twitch.tv/OMODYTV">
  🎮 Twitch
</a>

<a class="button kick" href="https://kick.com/OMODYTV">
  🎥 Kick
</a>

<a class="button youtube" href="https://youtube.com/@OMODYTV/live">
  ▶️ YouTube
</a>

</div>

<div class="footer">
LIVE • CLIPS • CONTENT
</div>

</body>
</html>
