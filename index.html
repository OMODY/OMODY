<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
  background: black;
}

/* 🔵🟠 Energy Background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 50%, #0A1AFF55, transparent 60%),
    radial-gradient(circle at 80% 50%, #FF6A0055, transparent 60%);
  animation: energyMove 6s infinite linear;
}

@keyframes energyMove {
  0% { transform: translateX(-5%); }
  50% { transform: translateX(5%); }
  100% { transform: translateX(-5%); }
}

/* Glow lines */
.lines {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(120deg, transparent 40%, #0A1AFF 50%, transparent 60%),
    linear-gradient(-120deg, transparent 40%, #FF6A00 50%, transparent 60%);
  opacity: 0.1;
  animation: moveLines 4s linear infinite;
}

@keyframes moveLines {
  0% { background-position: -200px 0, 200px 0; }
  100% { background-position: 200px 0, -200px 0; }
}

/* Logo */
.logo {
  margin-top: 60px;
  width: 200px;
  filter:
    drop-shadow(0 0 25px #0A1AFF)
    drop-shadow(0 0 25px #FF6A00);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* Title */
h1 {
  margin-top: 15px;
  font-size: 36px;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #0A1AFF, #FF6A00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Container */
.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

/* Buttons */
.button {
  display: block;
  margin: 18px 0;
  padding: 18px;
  border-radius: 18px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
  color: white;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.2);

  transition: 0.3s;
}

/* Hover */
.button:hover {
  transform: scale(1.1);
  box-shadow:
    0 0 30px #0A1AFF,
    0 0 30px #FF6A00;
}

/* Footer */
.footer {
  margin-top: 40px;
  font-size: 13px;
  color: #aaa;
  letter-spacing: 2px;
}
</style>

</head>

<body>

<div class="lines"></div>

<img src="omody_main_logo.png" class="logo">

<h1>OMODY</h1>

<div class="container">

<a class="button" href="https://twitch.tv/OMODYTV">
🎮 Twitch
</a>

<a class="button" href="https://kick.com/OMODYTV">
🎥 Kick
</a>

<a class="button" href="https://youtube.com/@OMODYTV/live">
▶️ YouTube
</a>

</div>

<div class="footer">
LIVE • CLIPS • CONTENT
</div>

</body>
</html>
