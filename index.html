<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMODY</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;

  background: linear-gradient(90deg, #0A1AFF 50%, #FF6A00 50%);
}

/* Overlay for blending */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, transparent 30%, black 90%);
}

/* Logo */
.logo {
  margin-top: 60px;
  width: 200px;
  filter: drop-shadow(0 0 25px #FF6A00) drop-shadow(0 0 25px #0A1AFF);
}

/* Title */
h1 {
  margin-top: 15px;
  font-size: 36px;
  letter-spacing: 4px;
  color: white;
  text-shadow:
    -2px 0 #0A1AFF,
    2px 0 #FF6A00;
}

/* Container */
.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

/* Buttons */
.button {
  display: block;
  margin: 18px 0;
  padding: 18px;
  border-radius: 18px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
  color: white;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.2);

  transition: 0.3s;
}

/* Hover */
.button:hover {
  transform: scale(1.08);
  box-shadow:
    0 0 20px #0A1AFF,
    0 0 20px #FF6A00;
}

/* Footer */
.footer {
  margin-top: 40px;
  font-size: 13px;
  color: #ccc;
  letter-spacing: 2px;
}
</style>

</head>

<body>

<img src="omody_main_logo.png" class="logo">

<h1>OMODY</h1>

<div class="container">

<a class="button" href="https://twitch.tv/OMODYTV">
🎮 Twitch
</a>

<a class="button" href="https://kick.com/OMODYTV">
🎥 Kick
</a>

<a class="button" href="https://youtube.com/@OMODYTV/live">
▶️ YouTube
</a>

</div>

<div class="footer">
LIVE • CLIPS • CONTENT
</div>

</body>
</html>
